<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agy 터미널 — Antigravity CLI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0b0d12; color: #d6dae1; font-family: "Segoe UI", system-ui, sans-serif; }
    header { padding: 10px 16px; border-bottom: 1px solid #222836; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header .hint { font-size: 12px; color: #8a93a6; }
    #status { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #1b2231; color: #9aa4b8; }
    #status.ok { background: #14351f; color: #6ee7a0; }
    #status.bad { background: #3a1d22; color: #f0a0a8; }
    .bar { padding: 8px 16px; border-bottom: 1px solid #222836; display: flex; gap: 8px; flex-wrap: wrap; }
    .bar button { background: #1b2231; color: #cdd4e0; border: 1px solid #2a3142; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
    .bar button:hover { background: #232c3e; }
    #term { padding: 8px; height: calc(100vh - 110px); }
  </style>
</head>
<body>
  <header>
    <h1>🖥️ agy 터미널</h1>
    <span class="hint">여기서 일반 터미널처럼 <code>agy</code> 명령을 입력하세요 — 로그인·계정전환·모델변경·사용량조회.</span>
    <span id="status">연결 중…</span>
  </header>
  <div class="bar">
    <button data-cmd="agy&#10;">agy 로그인</button>
    <button data-cmd="agy logout&#10;">로그아웃(계정전환)</button>
    <button data-cmd="agy --version&#10;">버전</button>
    <button data-cmd="agy --help&#10;">명령 목록(help)</button>
    <button id="btn-clear">화면 지우기</button>
    <button id="btn-oscmd" title="브라우저 내장 터미널이 안 될 때 실제 cmd 창을 띄웁니다">🪟 실제 cmd 창 열기</button>
  </div>
  <div id="term"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script nonce="{{CSP_NONCE}}">
    (function () {
      const statusEl = document.getElementById('status');
      const term = new window.Terminal({
        fontFamily: 'Consolas, "Courier New", monospace',
        fontSize: 13,
        cursorBlink: true,
        theme: { background: '#0b0d12', foreground: '#d6dae1' },
      });
      const fit = new window.FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(document.getElementById('term'));
      fit.fit();

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls || '';
      }

      let ws = null;
      function sendResize() {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
      }

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/api/agy/terminal/ws`);
        ws.onopen = () => { setStatus('연결됨', 'ok'); sendResize(); };
        ws.onclose = (ev) => setStatus(`연결 종료 (code ${ev.code}${ev.reason ? ' · ' + ev.reason : ''}) — 새로고침`, 'bad');
        ws.onerror = () => setStatus('연결 오류', 'bad');
        ws.onmessage = (ev) => {
          let msg;
          try { msg = JSON.parse(ev.data); } catch { term.write(ev.data); return; }
          if (msg.type === 'out' || msg.type === 'error') term.write(msg.data);
          else if (msg.type === 'exit') { term.write('\r\n[세션 종료]\r\n'); setStatus('세션 종료', 'bad'); }
        };
        term.onData((d) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'in', data: d })); });
      }

      // 먼저 진단을 받아 화면에 표시 → 원인을 즉시 알 수 있게.
      (async () => {
        try {
          const r = await fetch('/api/agy/terminal/diag');
          const d = await r.json();
          if (!d.loopback_ok) {
            term.writeln('\x1b[31m이 터미널은 로컬(127.0.0.1)에서만 동작합니다. 현재 host=' + d.client_host + '\x1b[0m');
          }
          if (!d.pty_available) {
            term.writeln('\x1b[33m[PTY 백엔드 없음] 내장 터미널을 쓰려면 설치가 필요합니다:\x1b[0m');
            term.writeln('  Windows : pip install pywinpty');
            term.writeln('  macOS/Linux : pip install ptyprocess');
            term.writeln('  (venv 사용 시: venv\\Scripts\\python -m pip install pywinpty)');
            if (d.pty_import_error) term.writeln('  사유: ' + d.pty_import_error);
            term.writeln('');
            term.writeln('\x1b[36m대안: 위의 [실제 cmd 창 열기] 버튼을 누르면 진짜 cmd 창이 떠서 거기서 agy 로그인할 수 있습니다.\x1b[0m');
            setStatus('PTY 미설치 — 위 안내 참고', 'bad');
            if (!d.agy_installed) term.writeln('\x1b[33m참고: agy 도 아직 설치되지 않았습니다 (docs/antigravity/install.md).\x1b[0m');
            return; // WS 연결 시도하지 않음
          }
          if (!d.agy_installed) {
            term.writeln('\x1b[33m참고: agy 가 설치되지 않았습니다. 셸에서 설치 후 `agy` 로 로그인하세요 (docs/antigravity/install.md).\x1b[0m');
          }
        } catch (e) {
          term.writeln('진단 호출 실패: ' + e);
        }
        connect();
      })();

      window.addEventListener('resize', () => { fit.fit(); sendResize(); });

      document.querySelectorAll('.bar button[data-cmd]').forEach((b) => {
        b.addEventListener('click', () => {
          const cmd = b.getAttribute('data-cmd');
          if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'in', data: cmd }));
          term.focus();
        });
      });
      document.getElementById('btn-clear').addEventListener('click', () => term.clear());

      // 폴백: 브라우저 내장 터미널 대신 실제 cmd 창을 띄운다.
      document.getElementById('btn-oscmd').addEventListener('click', async () => {
        try {
          const r = await fetch('/api/agy/open-terminal', { method: 'POST' });
          const d = await r.json().catch(() => ({}));
          if (r.ok && d.ok) term.writeln('\r\n\x1b[32m실제 cmd 창을 열었습니다. 그 창에서 agy 로 로그인하세요.\x1b[0m');
          else term.writeln('\r\n\x1b[31m' + (d.message || 'cmd 창을 열지 못했습니다.') + '\x1b[0m');
        } catch (e) { term.writeln('\r\n\x1b[31mcmd 창 열기 실패: ' + e + '\x1b[0m'); }
      });

      term.focus();
    })();
  </script>
</body>
</html>
