<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agy 터미널 — Antigravity CLI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0b0d12; color: #d6dae1; font-family: "Segoe UI", system-ui, sans-serif; }
    header { padding: 10px 16px; border-bottom: 1px solid #222836; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header .hint { font-size: 12px; color: #8a93a6; }
    #status { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #1b2231; color: #9aa4b8; }
    #status.ok { background: #14351f; color: #6ee7a0; }
    #status.bad { background: #3a1d22; color: #f0a0a8; }
    .bar { padding: 8px 16px; border-bottom: 1px solid #222836; display: flex; gap: 8px; flex-wrap: wrap; }
    .bar button { background: #1b2231; color: #cdd4e0; border: 1px solid #2a3142; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
    .bar button:hover { background: #232c3e; }
    #term { padding: 8px; height: calc(100vh - 110px); }
  </style>
</head>
<body>
  <header>
    <h1>🖥️ agy 터미널</h1>
    <span class="hint">여기서 일반 터미널처럼 <code>agy</code> 명령을 입력하세요 — 로그인·계정전환·모델변경·사용량조회.</span>
    <span id="status">연결 중…</span>
  </header>
  <div class="bar">
    <button data-cmd="agy&#10;">agy 로그인</button>
    <button data-cmd="agy logout&#10;">로그아웃(계정전환)</button>
    <button data-cmd="agy --version&#10;">버전</button>
    <button data-cmd="agy --help&#10;">명령 목록(help)</button>
    <button id="btn-clear">화면 지우기</button>
  </div>
  <div id="term"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script nonce="{{CSP_NONCE}}">
    (function () {
      const statusEl = document.getElementById('status');
      const term = new window.Terminal({
        fontFamily: 'Consolas, "Courier New", monospace',
        fontSize: 13,
        cursorBlink: true,
        theme: { background: '#0b0d12', foreground: '#d6dae1' },
      });
      const fit = new window.FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(document.getElementById('term'));
      fit.fit();

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/api/agy/terminal/ws`);

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls || '';
      }

      ws.onopen = () => {
        setStatus('연결됨', 'ok');
        sendResize();
      };
      ws.onclose = () => setStatus('연결 종료 — 새로고침하세요', 'bad');
      ws.onerror = () => setStatus('연결 오류', 'bad');
      ws.onmessage = (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { term.write(ev.data); return; }
        if (msg.type === 'out' || msg.type === 'error') term.write(msg.data);
        else if (msg.type === 'exit') { term.write('\r\n[세션 종료]\r\n'); setStatus('세션 종료', 'bad'); }
      };

      term.onData((d) => { if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'in', data: d })); });

      function sendResize() {
        if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
      }
      window.addEventListener('resize', () => { fit.fit(); sendResize(); });

      document.querySelectorAll('.bar button[data-cmd]').forEach((b) => {
        b.addEventListener('click', () => {
          const cmd = b.getAttribute('data-cmd');
          if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'in', data: cmd }));
          term.focus();
        });
      });
      document.getElementById('btn-clear').addEventListener('click', () => term.clear());
      term.focus();
    })();
  </script>
</body>
</html>
