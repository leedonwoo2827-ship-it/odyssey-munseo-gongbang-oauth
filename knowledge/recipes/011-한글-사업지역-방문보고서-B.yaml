id: 011-한글-사업지역-방문보고서-B
name: 사업지역 방문 보고서 (B)
category: 방문/파견보고
description: 입력 자료로 '사업지역 방문 보고서' 초안 생성.
output:
  format: hwpx
  filename: 사업지역-방문-보고서-B_{date}
inputs:
- key: inputA
  label: 현장 방문 보고서(영문)
  required: false
  accept:
  - docx
  - pdf
- key: inputB
  label: 사업 성과관리(M&E) 가이드라인
  required: false
  accept:
  - pdf
prompt: '당신은 AIM 해외사업부(유비온 컨소시엄)의 ''KOICA 나이지리아 초중등 교육환경개선 사업(PMC)'' 문서 작성 전문가입니다.

  아래 입력 자료를 근거로 ''사업지역 방문 보고서 (B)'' 초안을 한국어 문서로 작성하세요.


  [작성 원칙]

  - 사실·수치·고유명사(인명·기관·지역·일자·금액)는 입력 자료에 있는 것만 사용한다. 없거나 불확실하면 지어내지 말고 [확인 필요: …]로 남긴다.

  - 보고서체의 정확하고 간결한 공식 문체. 홍보성·과장 표현 배제.

  - 표준 용어를 일관되게: PMC, KOICA, UBEC, SUBEB(주 교육청), TLC(Teachers Learning Community), SCM(SUBEB Chair Meeting), ICSE(International Conference on Smart Education), GTT(일반교원연수), M&E(성과관리), PDM(성과지표).


  [표준 구성 — 이 목차를 따른다]

  1. 방문 개요 (일시 / 장소 / 대상 학교·기관 / 참석자)

  2. 방문 목적

  3. 주요 활동·면담 내용 (현장 점검·면담 발언 요지)

  4. 합의·결정사항 및 현장 이슈

  5. 시사점 및 후속 조치

  ※ 입력이 영문 Working Visit 보고서이면 핵심을 한국어 보고서체로 재구성한다(사실 보존).


  [입력 자료]

  {{inputs}}


  [추가 지시]

  {{instruction}}

  '
