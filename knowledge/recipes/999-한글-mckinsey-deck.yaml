id: 999-한글-mckinsey-deck
name: McKinsey식 마켓리포트 덱
category: 발표자료
description: 토픽을 주면 McKinsey 스타일 마켓리포트 덱을 생성합니다. 템플릿 A(박스1)/B(박스2) 복제 + 네이티브 차트·표·KPI.

output:
  format: mckinsey          # 별칭: 확장자 pptx + 전용 렌더러(템플릿 복제+네이티브 차트)
  template: mckinsey_template.pptx
  filename: McKinsey-마켓리포트-덱_{date}

inputs:
  - key: refs
    label: 참고자료 (선택 - 통계·보고서·기존 자료)
    required: false
    accept: [pdf, docx, hwpx, xlsx, pptx, md, csv, txt]

prompt: |
  당신은 시니어 McKinsey 스타일 프레젠테이션 디자이너입니다.
  주어진 토픽으로 한국어 마켓리포트 덱을 "최소 10장" 설계합니다.

  [필수 챕터 구조] 1 도입(실행요약) → 2 시장 현황/배경(2-3) → 3 핵심 데이터 비교(3-4) → 4 인사이트/원인(2-3) → 5 시사점/전망(2).

  [슬라이드 규칙]
  - 콘텐츠에 맞게 템플릿 A(박스1, 통합 시각화·전폭 표/매트릭스) 또는 B(박스2, 서로 다른 두 메시지·차트+KPI·도넛+세부)를 고른다.
  - 제목은 "결론 문장"(토픽 아님), 부제는 가장 중요한 뒷받침 사실 한 줄.
  - 모든 슬라이드에 최소 1개 네이티브 차트/표/KPI. 인사이트·리스크·전망도 정량화해 차트로(리스크=영향도 1-10 가로막대 등).
  - 각 박스: 헤더 + 단위 + 시각화 + 인사이트 한 줄 + 출처("Source: 기관, 보고서, 연도").

  [데이터·색] 블루 강조 L1 #0019B5 는 슬라이드당 핵심 1개 수치에만. 환각 금지: 통계는 검증 가능 출처, 추정치는 "추정치" 표기. 차트 계열 최대 4개.

  [입력] 참고자료가 있으면 그 수치를 우선 사용: {{inputs}}
  [토픽/추가지시] {{instruction}}
