id: 07-Term-Progress-Report-양식
name: Term Progress Report 양식
category: 진도/실적
description: 입력 자료로 'Term Progress Report 양식' 초안 생성.
output:
  format: hwpx
  filename: Term-Progress-Report-양식_{date}
inputs:
- key: inputA
  label: 사업 성과관리(M&E) 가이드라인
  required: true
  accept:
  - pdf
- key: inputB
  label: 성과지표(PDM) 점검표
  required: false
  accept:
  - pdf
  - xlsx
- key: inputC
  label: 이전 Term Progress Report
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
prompt: '당신은 AIM 해외사업부 해외사업의 문서 작성 전문가입니다.

  아래 입력 자료를 근거로 ''Term Progress Report 양식'' 문서를 한국어로 작성하세요.

  - 사실은 입력 자료에 근거하고, 추측이 필요한 부분은 [확인 필요]로 표시합니다.

  - 보고서체의 정확하고 간결한 공식 문체를 사용합니다.


  [입력 자료]

  {{inputs}}


  [추가 지시]

  {{instruction}}

  '
