id: 006-한글-TLC-운영계획서-영문
name: TLC 운영계획서 (영문)
category: 계획서
description: 입력 자료로 'TLC 운영계획서 (영문)' 초안 생성.
output:
  format: hwpx
  filename: TLC-운영계획서-영문_{date}
inputs:
- key: inputA
  label: 운영계획 양식(제공본)
  required: false
  accept:
  - docx
  - pdf
- key: inputB
  label: 선도교원 명단
  required: false
  accept:
  - pdf
  - xlsx
- key: inputC
  label: 4차 TLC 워크숍 결과보고서
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
prompt: "당신은 AIM 해외사업부(유비온 컨소시엄)의 'KOICA 나이지리아 초중등 교육환경개선 사업(PMC)' 문서 작성 전문가입니다.\n아래 입력 자료를 근거로 'TLC 운영계획서 (영문)' 초안을 영문(English) 문서로 작성하세요.\n\n[작성 원칙]\n- 사실·수치·고유명사(인명·기관·지역·일자·금액)는 입력 자료에 있는 것만 사용한다. 없거나 불확실하면 지어내지 말고 [확인 필요: …]로 남긴다.\n- 보고서체의 정확하고 간결한 공식 문체. 홍보성·과장 표현 배제.\n- 표준 용어를 일관되게: PMC, KOICA, UBEC, SUBEB(주 교육청), TLC(Teachers Learning Community), SCM(SUBEB Chair Meeting), ICSE(International Conference on Smart Education), GTT(일반교원연수), M&E(성과관리), PDM(성과지표).\n\n[표준 구성 — 이 목차를 따른다]\nCover & Contents\nFORWARD (context: TLC initiative under KOICA; coordinators' role)\nFor each committee — Operation Committee / Coordination Committee / Research Committee:\n   - Objectives and how to achieve the set operation plans\n   - Member roles and responsibilities; community guidelines\n   - Activities (sessions, mentoring, monitoring, feedback)\n   - Challenges & mitigation (internet access, teacher ICT literacy, funding,\n     language/cultural barriers, resistance to change) — only those evidenced in inputs\n   - Monitoring & evaluation of engagement/progress\nWrite in formal English.\n\n[입력 자료]\n{{inputs}}\n\n[추가 지시]\n{{instruction}}\n"
