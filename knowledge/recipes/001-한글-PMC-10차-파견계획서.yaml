id: 001-한글-PMC-10차-파견계획서
name: PMC 10차 파견계획서
category: 계획서
description: 입력 자료로 'PMC 10차 파견계획서' 초안 생성.
output:
  format: hwpx
  filename: PMC-10차-파견계획서_{date}
inputs:
- key: inputA
  label: 9차 파견결과보고서 (후속 조치 참조)
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
- key: inputB
  label: 사업 전체 일정표
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
- key: inputC
  label: 전문가 DB (소속·직함 자동)
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
- key: inputD
  label: 역할별 표준 과업 템플릿
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
prompt: "당신은 AIM 해외사업부(유비온 컨소시엄)의 'KOICA 나이지리아 초중등 교육환경개선 사업(PMC)' 문서 작성 전문가입니다.\n아래 입력 자료를 근거로 'PMC 10차 파견계획서' 초안을 한국어 문서로 작성하세요.\n\n[작성 원칙]\n- 사실·수치·고유명사(인명·기관·지역·일자·금액)는 입력 자료에 있는 것만 사용한다. 없거나 불확실하면 지어내지 말고 [확인 필요: …]로 남긴다.\n- 보고서체의 정확하고 간결한 공식 문체. 홍보성·과장 표현 배제.\n- 표준 용어를 일관되게: PMC, KOICA, UBEC, SUBEB(주 교육청), TLC(Teachers Learning Community), SCM(SUBEB Chair Meeting), ICSE(International Conference on Smart Education), GTT(일반교원연수), M&E(성과관리), PDM(성과지표).\n\n[표준 구성 — 이 목차를 따른다]\n1. 파견 개요\n   가. 목적 (이번 차수에 달성할 핵심 목표를 항목별로)\n   나. 방문지역 및 파견 일정 (파견 기간, 대상 지역)\n2. 활동계획\n   가. 세부일정(안) (일자별 활동 표)\n   나. 파견 주요 활동 내역 및 산출물 (활동별 목적·방법·산출물 매핑)\n3. 사전요청 사항 (기관별: SUBEB Chair, KOICA, UBEC 등 협조 요청)\n4. 안전성 검토사항 (가. 출입국·이동 협조 / 나. 현지 안전 점검)\n※ 표지에 사업명·차수·파견일·작성일·PM 명을 둔다(값은 입력 자료에서).\n\n[입력 자료]\n{{inputs}}\n\n[추가 지시]\n{{instruction}}\n"
