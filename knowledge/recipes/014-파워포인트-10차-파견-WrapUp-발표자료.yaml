id: 014-파워포인트-10차-파견-WrapUp-발표자료
name: 10차 파견 Wrap-Up 발표자료
category: 발표자료
description: 입력 자료로 '10차 파견 Wrap-Up 발표자료' 초안 생성.
output:
  format: pptx
  filename: 10차-파견-Wrap-Up-발표자료_{date}
inputs:
- key: inputA
  label: PMC 10차 파견결과보고서 (산출물13)
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
- key: inputB
  label: 직전 차수 Wrap-Up 발표자료
  required: false
  accept:
  - pdf
  - pptx
- key: inputC
  label: 사업 전체 진행률 데이터
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
prompt: "당신은 AIM 해외사업부(유비온 컨소시엄)의 'KOICA 나이지리아 초중등 교육환경개선 사업(PMC)' 문서 작성 전문가입니다.\n아래 입력 자료를 근거로 '10차 파견 Wrap-Up 발표자료' 초안을 한국어 문서로 작성하세요.\n\n[작성 원칙]\n- 사실·수치·고유명사(인명·기관·지역·일자·금액)는 입력 자료에 있는 것만 사용한다. 없거나 불확실하면 지어내지 말고 [확인 필요: …]로 남긴다.\n- 보고서체의 정확하고 간결한 공식 문체. 홍보성·과장 표현 배제.\n- 표준 용어를 일관되게: PMC, KOICA, UBEC, SUBEB(주 교육청), TLC(Teachers Learning Community), SCM(SUBEB Chair Meeting), ICSE(International Conference on Smart Education), GTT(일반교원연수), M&E(성과관리), PDM(성과지표).\n\n[슬라이드 구성 — 발표용. 각 슬라이드 = 제목 + 핵심 불릿 3~5개]\n1. 표지 (사업명 / 10차 파견 / 기간 / PM)\n2. 사업 개요 (KOICA PMC 사업 범위·목표 한눈에)\n3. 10차 파견 개요 (목적·기간·방문지역·주요 일정)\n4~. 활동별 진행 현황 (TLC 워크숍 / SCM / ICSE / 학교 방문 / GTT / 콘텐츠개발 등 — 활동별 1~2장)\n   · 핵심 진행 내용 + 성과(수치·지표는 입력 자료에서, 없으면 [확인 필요])\nN-2. 주요 성과 종합 (Performance Evaluation, PDM 지표 중심)\nN-1. 이슈 및 시사점\nN. 향후 계획 (다음 차수로 이월·제안)\n※ 화면 텍스트는 키워드·수치 위주로 간결하게, 과장 표현 금지.\n\n[입력 자료]\n{{inputs}}\n\n[추가 지시]\n{{instruction}}\n"
