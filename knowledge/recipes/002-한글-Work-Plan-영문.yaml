id: 002-한글-Work-Plan-영문
name: Work Plan (영문)
category: 계획서
description: 입력 자료로 'Work Plan (영문)' 초안 생성.
output:
  format: hwpx
  filename: Work-Plan-영문_{date}
inputs:
- key: inputA
  label: 국문 파견계획서 최신본
  required: false
  accept:
  - hwpx
  - pdf
- key: inputB
  label: 직전 차수 Wrap-Up 발표자료
  required: false
  accept:
  - pdf
  - pptx
prompt: "당신은 AIM 해외사업부(유비온 컨소시엄)의 'KOICA 나이지리아 초중등 교육환경개선 사업(PMC)' 문서 작성 전문가입니다.\n아래 입력 자료를 근거로 'Work Plan (영문)' 초안을 영문(English) 문서로 작성하세요.\n\n[작성 원칙]\n- 사실·수치·고유명사(인명·기관·지역·일자·금액)는 입력 자료에 있는 것만 사용한다. 없거나 불확실하면 지어내지 말고 [확인 필요: …]로 남긴다.\n- 보고서체의 정확하고 간결한 공식 문체. 홍보성·과장 표현 배제.\n- 표준 용어를 일관되게: PMC, KOICA, UBEC, SUBEB(주 교육청), TLC(Teachers Learning Community), SCM(SUBEB Chair Meeting), ICSE(International Conference on Smart Education), GTT(일반교원연수), M&E(성과관리), PDM(성과지표).\n\n[표준 구성 — 이 목차를 따른다]\nCover: project title, dispatch no., period, PM name (values from inputs)\nPart I. The Progress of KOICA PMC Project in Nigeria\n   - Project scope & aims, what has been done / ongoing across six smart schools\n   - Programs: GTT, TLC, SCM, Smart School Fair, Performance Evaluation, Content Development\nPart II. Work Schedule for this Dispatch\n   - Activity-by-activity plan with dates, locations, expected outputs\nWrite in concise formal English (report register).\n\n[입력 자료]\n{{inputs}}\n\n[추가 지시]\n{{instruction}}\n"
