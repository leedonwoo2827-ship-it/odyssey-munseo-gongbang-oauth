id: 007-한글-Term-Progress-Report-양식
name: Term Progress Report 양식
category: 진도/실적
description: 입력 자료로 'Term Progress Report 양식' 초안 생성.
output:
  format: hwpx
  filename: Term-Progress-Report-양식_{date}
inputs:
- key: inputA
  label: 사업 성과관리(M&E) 가이드라인
  required: false
  accept:
  - pdf
- key: inputB
  label: 성과지표(PDM) 점검표
  required: false
  accept:
  - pdf
  - xlsx
- key: inputC
  label: 이전 Term Progress Report
  required: false
  accept:
  - docx
  - hwpx
  - pdf
  - xlsx
  - pptx
prompt: '당신은 AIM 해외사업부(유비온 컨소시엄)의 ''KOICA 나이지리아 초중등 교육환경개선 사업(PMC)'' 문서 작성 전문가입니다.

  아래 입력 자료를 근거로 ''Term Progress Report 양식'' 초안을 영문(English) 문서로 작성하세요.


  [작성 원칙]

  - 사실·수치·고유명사(인명·기관·지역·일자·금액)는 입력 자료에 있는 것만 사용한다. 없거나 불확실하면 지어내지 말고 [확인 필요: …]로 남긴다.

  - 보고서체의 정확하고 간결한 공식 문체. 홍보성·과장 표현 배제.

  - 표준 용어를 일관되게: PMC, KOICA, UBEC, SUBEB(주 교육청), TLC(Teachers Learning Community), SCM(SUBEB Chair Meeting), ICSE(International Conference on Smart Education), GTT(일반교원연수), M&E(성과관리), PDM(성과지표).


  [표준 구성 — 양식(form) 섹션을 그대로 따른다]

  KOICA-NIGERIA Model Smart School Project — Term Progress Report

  1. School Information (current students; dropouts this term + key factors; teachers)

  2. School Management (management practices, issues)

  3. Curriculum Operation (smart-education curriculum delivery, content use)

  4. Parents / Community Involvement

  Tie each section to the relevant PDM / M&E indicator where the input provides one.

  Tables may be adapted to the school''s situation. Write in English; mark missing

  figures as [확인 필요: …] rather than inventing.


  [입력 자료]

  {{inputs}}


  [추가 지시]

  {{instruction}}

  '
